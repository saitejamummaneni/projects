<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Contact</title>
</head>
<body>

    <style>
        body {
    /* margin: 0; */
    font-family: 'Playfair Display', serif;
}

/* section 1 */

/* NAVBAR */
.navbar {
    display: flex;
    margin-top: 20px;
    font-size: 17px;
    justify-content: space-between;
    align-items: center;
    color: white;
    letter-spacing: 5px;
    text-transform: uppercase;
}

.logo {
    height: 50px;
    margin-top: 20px;
    margin-left: 20px;
    z-index: 2;
    filter: brightness(0) invert(1);
}

nav a {
    margin: 0 20px;
    font-size: 15px;
    z-index: 2;
    text-decoration: none;
    color: bold;
    transition: 0.3s;
    padding: 40px;
    letter-spacing: 5px;
    text-transform: uppercase;
    font-size: 17px;
}

nav a:hover {
    text-decoration: underline;

}

/* ICONS */
.icons{
    display: flex;
    margin-right: 30px;
}
.icons i {
    font-size: 18px;
    z-index: 2;
    background-color: rgb(244 207 223);
    border-color: rgb(255, 255, 255);
    width: 40px;
    height: 40px;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    padding-left: 3px;
    margin-left: 10px;
    transition: 0.3s;
}
 .fa-brands.fa-facebook{
  font-size: 18px;
    color:black;
  }
  .fa-brands.fa-twitter{
    font-size: 18px;
    color:black;
  }
  .fa-brands.fa-instagram{
    font-size: 18px;
    color:black;
  }

.icons i:hover {
    background: white;
}

.navbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    width: 100%;
}

.map {
    margin-top: -100px;
    margin-bottom: -150px;
    
}

/* form */
.contact-card {
    width: 80%;
    max-width: 1000px;
    margin: -0px auto 0;
    background: #fff;
    display: flex;
    justify-content: space-between;
    padding: 50px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    position: relative;
    z-index: 10;
}


.contact-left {
    width: 50%;
}

.contact-left input,
.contact-left textarea {
    width: 100%;
    border: none;
    border-bottom: 1px solid #aaa;
    margin-bottom: 20px;
    padding: 10px;
    outline: none;
}

.contact-left textarea {
    height: 100px;
}

.contact-left button {
    padding: 10px 30px;
    border: 1px solid #333;
    cursor: pointer;
    size: 80px;
}
.contact-left button:hover {
    background-color: black;
    color: white;
}

.contact-right {
    width: 40%;
}

.contact-right h2 {
    font-size: 30px;
    margin-bottom: 15px;
}

/* SECTION */
.gallery-section {
    position: relative;
    padding: 80px 40px;
    text-align: center;
}

/* BACKGROUND IMAGE */
.gallery-background img {
    margin-top: -50px;
    width: 1100px;
    height: 500px;
    margin-bottom: 150px;

}
.footer {
    height: 200px;
    text-align: center;
    vertical-align: baseline;
    outline: 0;
    background: url('assets/footer-img.jpg');
    color: #ffffff;
    padding-top: 140px;
    padding-bottom: 140px;
    padding: 72px 0 52px;
}
    </style>
     <!-- HERO -->
    <section class="hero">
        <header>
            <div class="navbar">
                <img class="logo"
                    src="https://bridge248.qodeinteractive.com/wp-content/uploads/2018/06/lmobile-ogo.png">

                <nav>
                    <a href="index.html">HOME</a>
                    <a href="team.html">TEAM</a>
                    <a href="about.html">ABOUT</a>
                    <a href="contact.html">CONTACT</a>
                </nav>

                <div class="icons">
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-twitter"></i>
                    <i class="fa-brands fa-instagram"></i>
                </div>
            </div>
        </header>

         <!-- map -->

        <div class="map">
            <iframe src="https://www.google.com/maps?q=Sydney&output=embed" width="100%" height="400" style="border:0;"
                allowfullscreen="" loading="lazy">
            </iframe>
        </div>
        <!-- form -->
        <section class="contact-card">

            <div class="contact-left">
                <input type="text" placeholder="Name*">
                <input type="email" placeholder="Email*">
                <textarea placeholder="Message"></textarea>
                <button >SEND</button>
            </div>

            <div class="contact-right">
                <h2><strong>Visit</strong> our shops</h2>
                <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
                <p>09:00–19h Monday – Friday</p>
                <p>75–11 Jewett Ave Jersey City</p>
                <p>+ (1) 555 678 786</p>
            </div>

        </section>

        <!-- GALLERY SECTION -->
        <section class="gallery-section">

            <!-- Background Image -->
            <div class="gallery-background">
                <img src="https://bridge248.qodeinteractive.com/wp-content/uploads/2018/06/contact-us-img-1.png" alt="">
            </div>

             <!-- FOOTER -->
        <div class="footer">
            <h4>
                <img class="logo"
                    src="https://bridge248.qodeinteractive.com/wp-content/uploads/2018/06/lmobile-ogo.png">
            </h4>
            <footer>
                <p>
                    © Copyright Qode Interactive — All Rights Reserved

                    Proudly Made For You.
                </p>
                <div class="icons">
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-twitter"></i>
                    <i class="fa-brands fa-instagram"></i>
                </div>
            </footer>
        </div>

</body>
</html>
